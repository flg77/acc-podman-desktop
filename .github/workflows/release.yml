name: Release

# Triggered by `git tag v0.x.y && git push --tags`.
#
# Two jobs, both on the acc1 self-hosted runner:
#
#   1. build-and-push  → builds the OCI image and pushes to BOTH:
#                          - quay.io/flg77/acc-podman-desktop  (canonical)
#                          - ghcr.io/flg77/acc-podman-desktop  (transition window
#                                                               — dropped after v0.4.0)
#
#   2. publish-release → pulls the matching `## [<version>]` section
#                        from CHANGELOG.md and creates the GitHub
#                        Release via `gh release create`.
#
# Both jobs run on RHEL UBI 10 (acc1 host) for ecosystem alignment.
# GitHub doesn't offer UBI-hosted runners, so we keep both on acc1;
# the trade-off is that acc1 outage blocks releases.  Mitigation:
# operator re-tags / re-fires the workflow when acc1 returns.
#
# acc1 runs podman, NOT Docker — the workflow uses Red Hat's
# buildah/podman actions (redhat-actions/*) instead of docker/*
# so no Docker daemon is required on the runner.
#
# Required repo secrets (set under Settings → Secrets and
# variables → Actions):
#
#   QUAY_USERNAME   = flg77+acc_podman_publisher
#   QUAY_PASSWORD   = <robot account token>
#
# Per proposal 001 in the operator's Obsidian vault.

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: [self-hosted, acc1]
    permissions:
      contents: read
      packages: write   # ghcr.io push during transition window
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the extension
        run: npm run build

      - name: Compute version
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # acc1 runs podman (RHEL/UBI), not Docker — use the
      # Red Hat-maintained buildah/podman actions so we don't
      # need a Docker daemon on the runner.

      - name: Login to quay.io (canonical registry)
        uses: redhat-actions/podman-login@v1
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Login to GHCR (transition window — dropped after v0.4.0)
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI image (amd64 only)
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          context: .
          archs: amd64
          image: acc-podman-desktop
          tags: |
            ${{ steps.meta.outputs.version }}
            latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Push to quay.io (canonical)
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: quay.io/flg77

      - name: Push to GHCR (transition mirror)
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ghcr.io/${{ github.repository_owner }}

  publish-release:
    needs: build-and-push
    runs-on: [self-hosted, acc1]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # Pull the section between `## [<version>]` and the next `## [`.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (capture) exit
              if ($0 ~ "## \\[" ver "\\]") { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          {
            echo "Install via Podman Desktop → Settings → Extensions → Install custom…"
            echo
            echo "Canonical image: \`quay.io/flg77/acc-podman-desktop:${VERSION}\`"
            echo
            echo "Mirror (transition window — dropped after v0.4.0):"
            echo "\`ghcr.io/flg77/acc-podman-desktop:${VERSION}\`"
            echo
            cat release-notes.md
          } > final-notes.md
          echo "path=final-notes.md" >> "$GITHUB_OUTPUT"

      - name: Draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.notes.outputs.path }}"
