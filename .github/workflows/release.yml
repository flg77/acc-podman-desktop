name: Release

# Triggered by `git tag v0.x.y && git push --tags`.
#
# Two jobs:
#
#   1. build-and-push  ÔåÆ runs on the acc1 self-hosted runner
#                        (label `acc1`).  Builds the OCI image
#                        and pushes to BOTH:
#                          - quay.io/flg77/acc-podman-desktop  (canonical)
#                          - ghcr.io/flg77/acc-podman-desktop  (transition window
#                                                               ÔÇö dropped after v0.4.0)
#
#   2. publish-release ÔåÆ runs on a GitHub-hosted runner.  Pulls
#                        the matching `## [<version>]` section
#                        from CHANGELOG.md and creates the
#                        GitHub Release.  Independent of acc1
#                        so the release-notes object publishes
#                        even if acc1 is offline (the build job
#                        will surface that failure separately).
#
# Required repo secrets (set under Settings ÔåÆ Secrets and
# variables ÔåÆ Actions):
#
#   QUAY_USERNAME   = flg77+acc_podman_publisher
#   QUAY_PASSWORD   = <robot account token>
#
# Per proposal 001 in the operator's Obsidian vault.

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: [self-hosted, acc1]
    permissions:
      contents: read
      packages: write   # ghcr.io push during transition window
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the extension
        run: npm run build

      - name: Compute version + tags
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          QUAY="quay.io/flg77/acc-podman-desktop"
          GHCR="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/acc-podman-desktop"
          {
            echo "version=$VERSION"
            echo "quay_tag=$QUAY:$VERSION"
            echo "quay_latest=$QUAY:latest"
            echo "ghcr_tag=$GHCR:$VERSION"
            echo "ghcr_latest=$GHCR:latest"
          } >> "$GITHUB_OUTPUT"

      - name: Login to quay.io (canonical registry)
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Login to GHCR (transition window ÔÇö dropped after v0.4.0)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push OCI image (amd64 only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.quay_tag }}
            ${{ steps.meta.outputs.quay_latest }}
            ${{ steps.meta.outputs.ghcr_tag }}
            ${{ steps.meta.outputs.ghcr_latest }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

  publish-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # Pull the section between `## [<version>]` and the next `## [`.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (capture) exit
              if ($0 ~ "## \\[" ver "\\]") { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          {
            echo "Install via Podman Desktop ÔåÆ Settings ÔåÆ Extensions ÔåÆ Install customÔÇĞ"
            echo
            echo "Canonical image: \`quay.io/flg77/acc-podman-desktop:${VERSION}\`"
            echo
            echo "Mirror (transition window ÔÇö dropped after v0.4.0):"
            echo "\`ghcr.io/flg77/acc-podman-desktop:${VERSION}\`"
            echo
            cat release-notes.md
          } > final-notes.md
          echo "path=final-notes.md" >> "$GITHUB_OUTPUT"

      - name: Draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.notes.outputs.path }}"
