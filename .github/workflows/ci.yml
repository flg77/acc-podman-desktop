name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Test
        run: npm test

      - name: Build OCI image (smoke test — does not push)
        run: |
          docker build -f Containerfile -t acc-podman-desktop:ci .
          docker image inspect acc-podman-desktop:ci \
            --format '{{ .Config.Labels }}' | tr ',' '\n'
